<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club App</title>
  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* لمنع التمرير غير الضروري */
        }



        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            /* تم تعديل مسار الصورة هنا ليعمل بشكل صحيح */
            background: url('Gemini_Generated_Image_y9as0dy9as0dy9as.png') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* وضع المحتوى في الأسفل */
            align-items: center;
            padding-bottom: 60px;
            box-sizing: border-box;
        }

        /* طبقة تظليل لجعل الأزرار واضحة فوق الصورة */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            width: 85%;
            max-width: 400px;
            text-align: center;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .btn-play {
            background-color: #d4af37; /* لون ذهبي */
            color: #000;
        }

        .btn-discover {
            background-color: rgba(255, 255, 255, 0.9);
            color: #333;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .social-icons {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 25px;
        }

        .social-icons a {
            color: white;
            font-size: 30px;
            transition: color 0.3s;
        }

        .social-icons a:hover {
            color: #d4af37;
        }
    </style>
</head>
<body>
   

<div class="container">
    <div class="overlay"></div>
    
    <div class="content">
        <a href="play.html" class="btn btn-play">ابدأ اللعب</a>
        
        <a href="about.html" class="btn btn-discover">اكتشف النادي</a>
        
        
        <a href=" https://docs.google.com/forms/d/1zr5ck_judI4Jh-CjfQLvcqfZO8hyrSyahK0JzmGGaYQ/edit" class="btn btn-discover" style="border: 2px solid #d4af37;">انضم إلينا</a>
       
        <div class="social-icons">
            <a href="https://www.instagram.com/boumerdes_a_a_s_club?igsh=MWJjZjQyeHRjbXA4eQ==" target="_blank"><i class="fab fa-instagram"></i></a>
            
            <a href="https://www.facebook.com/profile.php?id=100089827059191" target="_blank"><i class="fab fa-facebook"></i></a>
        </div>
    </div>
</div>

</body>
</html>
